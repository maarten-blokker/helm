image:
  repository: seerr/seerr
  tag: v3.2.0

ports:
  - name: http
    containerPort: 5055
    servicePort: 80
    protocol: TCP

livenessProbe:
  enabled: true
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5
  successThreshold: 1
  httpGet:
    path: /api/v1/settings/public
    port: http

readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 1
  failureThreshold: 15
  httpGet:
    path: /api/v1/settings/public
    port: http